<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly Expense Tracker</title>
   
    <style>
      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #5c83df, #1e293b);
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  color: rgb(250, 249, 249);
}

.container {
  width: 100%;
  max-width: 900px;
  background: rgb(149, 216, 236);
  color: #1e293b;
  border-radius: 20px;
  padding: 35px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  color: #0f172a;
  font-size: 2rem;
  font-weight: 700;
}

label {
  font-weight: 600;
}

.dropdown,
.box,
.days,
.spen,
.exp[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 18px;
  border: 1px solid #d1d5db;
  border-radius: 10px;
  font-size: 15px;
  transition: 0.3s ease;
}

input:focus,
select:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 8px rgba(37, 99, 235, 0.3);
}

.spent {
  margin-top: 10px;
  background: #eff6ff;
  border: 2px solid #bfdbfe;
  border-radius: 12px;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

#expense-list {
  margin-top: 30px;
  list-style: none;
}

.exp {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

.exp input {
  width: 48%;
  margin-right: 1%;
}

button {
  border: none;
  padding: 12px 22px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
}

.cl {
  background: #2563eb;
  color: white;
}

.cl:hover {
  background: #1d4ed8;
}

.cal {
  background: #16a34a;
  color: white;
}

.cal:hover {
  background: #15803d;
}

.delete {
  background: #dc2626;
  color: white;
}

.delete:hover {
  background: #b91c1c;
  
}

.footer,
.left {
  width: 100%;
  max-width: 900px;
  margin-top: 20px;
  background: white;
  color: #1e293b;
  padding: 18px;
  border-radius: 15px;
  font-size: 18px;
  font-weight: 600;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
}

.action-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

@media (max-width: 768px) {
  .exp input {
    width: 100%;
    margin-bottom: 10px;
  }

  .action-buttons {
    flex-direction: column;
  }

  button {
    width: 100%;
  }
}

    </style>
  </head>
  <body>
    <div class="container">
        <div>
        <h1 style="background-color: rgb(131, 222, 228) ;">MONTHLY EXPENSE TRACKER</h1>

        <label style="font-size: larger;">Select month: &nbsp</label>
        <select class="dropdown">
          <option class="bg-emerald-400 text-cyan-900" value="" style="font-size: large;"> --Choose Month--</option>
          <option value="1">January</option>
          <option value="2"> Feburary</option>
          <option value="3">March</option>
          <option value="4"> April</option>
          <option value="5"> May</option>
          <option value="6"> June</option>
          <option value="7"> July</option>
          <option value="8"> August</option>
          <option value="9"> September</option>
          <option value="10"> October</option>
          <option value="11"> November</option>
          <option value="12">December</option>

        </select><br>
        <span style="font-size: larger;" > Total Monthly Budget:<input type="number" placeholder="Enter amount (in Rs.)" class="box"> </span>
       <br>
       <div style="font-size: larger;">No. of days:<input type="number" class="days" readonly></div>
       <div style="font-size: larger;" >  Monthly Expenditure:<div class="spent"> </div> </div></div></div>
         <ol id="expense-list"> <li type="1" class="expense-list"><input type="text" class="expense-name" style="width:auto;" placeholder="Enter your expenditure for the day">
           <input type="number" class="spen" placeholder="Enter the money spent">
        <button class="delete" style=" color: white; background-color: red; padding:5px;">Delete</button>
        </li>
       </ol>
       <div style="justify-content: center;">
          <button class="cl" >More entries</button> 
          <button class="cal" >Calculate</button>
      </div>                 
      </div>
        <footer class="footer">
  Money Left: ₹<span id="money-left">0</span>
</footer>

<div class="left">
  Daily Budget Left: ₹<span id="daily-budget">0</span>
</div>
   <script src="project.js"></script>
   
  </body>
</html>
